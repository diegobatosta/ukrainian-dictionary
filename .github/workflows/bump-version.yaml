name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Read and validate current version
        id: read_version
        run: |
          CURRENT=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          if [[ "$CURRENT" != *-SNAPSHOT ]]; then
            echo "ERROR: Expected a SNAPSHOT version, got: $CURRENT"
            exit 1
          fi
          RELEASE="${CURRENT%-SNAPSHOT}"
          echo "snapshot=$CURRENT" >> $GITHUB_OUTPUT
          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          echo "Current snapshot version: $CURRENT"
          echo "Release version: $RELEASE"

      - name: Compute next snapshot version
        id: next_version
        run: |
          RELEASE="${{ steps.read_version.outputs.release }}"
          MAJOR=$(echo $RELEASE | cut -d'.' -f1)
          MINOR=$(echo $RELEASE | cut -d'.' -f2)
          PATCH=$(echo $RELEASE | cut -d'.' -f3)

          case "${{ github.event.inputs.bump_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT_SNAPSHOT="$MAJOR.$MINOR.$PATCH-SNAPSHOT"
          echo "next_snapshot=$NEXT_SNAPSHOT" >> $GITHUB_OUTPUT
          echo "Next snapshot version: $NEXT_SNAPSHOT"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit release version and tag
        run: |
          RELEASE="${{ steps.read_version.outputs.release }}"
          sed -i "s/^version=.*/version=$RELEASE/" gradle.properties
          git add gradle.properties
          git commit -m "chore: release v$RELEASE"
          git tag "v$RELEASE"

      - name: Commit next snapshot version
        run: |
          NEXT="${{ steps.next_version.outputs.next_snapshot }}"
          sed -i "s/^version=.*/version=$NEXT/" gradle.properties
          git add gradle.properties
          git commit -m "chore: bump to v$NEXT"

      - name: Push commits and tag
        run: |
          git push origin HEAD:main
          git push origin "refs/tags/v${{ steps.read_version.outputs.release }}"
